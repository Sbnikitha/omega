# ONE free web service — dashboard + API, paste env ONCE in Render dashboard.
# No credit card required for Render Hobby free tier.
#
# Deploy: Render Dashboard → New → Blueprint → point at repo, use this file
#   OR rename to render.yaml if you only want single-service.
#
# After first deploy, set FRONTEND_URL=https://YOUR-SERVICE.onrender.com
# (same URL for the one service). OMEGA_API_URL stays internal — see render.env.example.

services:
  - type: web
    name: omega
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile.render
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: OMEGA_DEMO_MODE
        value: "true"
      - key: OMEGA_CLICKHOUSE_ENABLED
        value: "false"
      - key: OMEGA_PAYMENT_TOKEN
        value: demo-paid
      - key: OMEGA_API_URL
        value: http://127.0.0.1:8001
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SENSO_API_KEY
        sync: false
      - key: SENSO_GEO_QUESTION_ID
        sync: false
      - key: PIONEER_API_KEY
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false
      - key: AIRBYTE_CLIENT_ID
        sync: false
      - key: AIRBYTE_CLIENT_SECRET
        sync: false
      - key: AIRBYTE_ACCESS_TOKEN
        sync: false
      - key: AIRBYTE_CONNECTOR_ID
        sync: false
      - key: TFY_HOST
        sync: false
      - key: TFY_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
